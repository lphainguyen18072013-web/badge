<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TGDV TOOL BADGE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #2a0a4a, #4a1d8c, #1e0b3d);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #5865f2, #7289da);
      padding: 32px 20px;
      text-align: center;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #43b581, #f04747, #7289da);
    }

    .discord-logo {
      width: 68px;
      height: 68px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 27px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .header p {
      opacity: 0.9;
      font-size: 15px;
      margin-top: 5px;
    }

    .main-content {
      padding: 35px 30px;
    }

    .profile-section {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #5865f2;
      object-fit: cover;
    }

    .profile-info h3 {
      font-size: 18.5px;
      font-weight: 600;
    }

    .logout-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 23px;
      color: #f04747;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
    }

    .logout-btn:hover { background: rgba(240,71,71,0.25); }

    .token-section label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 15px;
      opacity: 0.9;
    }

    .input-wrapper {
      position: relative;
    }

    #token {
      width: 100%;
      padding: 16px 52px 16px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
    }

    #token:focus {
      outline: none;
      border-color: #5865f2;
      box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.35);
    }

    .toggle-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #ccc;
    }

    .badge-selection h3 {
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 600;
      opacity: 0.9;
    }

    .badge-options {
      display: flex;
      gap: 14px;
      margin-bottom: 30px;
    }

    .badge-option {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .badge-option:hover {
      transform: translateY(-4px);
      border-color: #5865f2;
    }

    .badge-option.selected {
      background: linear-gradient(135deg, #5865f2, #7289da);
      border-color: #fff;
      transform: scale(1.04);
    }

    .badge-icon img {
      width: 78px;
      height: 78px;
      margin-bottom: 10px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    }

    .badge-option span {
      font-size: 15px;
      font-weight: 500;
    }

    .action-buttons {
      display: flex;
      gap: 14px;
    }

    .action-btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 15.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .set-btn {
      background: linear-gradient(135deg, #43b581, #5cbf2a);
      color: white;
    }

    .remove-btn {
      background: linear-gradient(135deg, #f04747, #e03e3e);
      color: white;
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .status-message {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      text-align: center;
      min-height: 24px;
    }

    .success { background: rgba(67, 181, 129, 0.25); color: #43b581; }
    .error   { background: rgba(240, 71, 71, 0.25); color: #f04747; }
    .info    { background: rgba(88, 101, 242, 0.25); color: #b9bbff; }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 15px;
      color: #ccc;
      font-size: 15px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid #5865f2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      padding: 22px;
      text-align: center;
      font-size: 13px;
      opacity: 0.75;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TOOL BADGE | MAKE BY LPHN </h1>
      <p>HypeSquad Badge Manager - Discord</p>
    </div>

    <div class="main-content">

      <!-- Profile -->
      <div id="profileSection" class="profile-section hidden">
        <img id="userAvatar" class="profile-avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar">
        <div class="profile-info">
          <span style="font-size:13px;opacity:0.8;">Connected as</span>
          <h3 id="username">...</h3>
        </div>
        <button id="logoutBtn" class="logout-btn">✕</button>
      </div>

      <!-- Token -->
      <div class="token-section">
        <label>Discord Token</label>
        <div class="input-wrapper">
          <input type="password" id="token" placeholder="Paste your token here" />
          <button id="toggleToken" class="toggle-btn">👁️</button>
        </div>
      </div>

      <!-- Badges -->
      <div class="badge-selection">
        <h3>Choose HypeSquad Badge</h3>
        <div class="badge-options">
          <div class="badge-option" data-house="2">
            <div class="badge-icon">
              <img src="https://cdn3.emoji.gg/emojis/6601-hypesquad-bravery.png" alt="Bravery">   <!-- Bạn có thể thay link ảnh Bravery của bạn -->
            </div>
            <span>Bravery</span>
          </div>

          <div class="badge-option" data-house="3">
            <div class="badge-icon">
              <img src="https://cdn3.emoji.gg/emojis/9554-hypesquad-brilliance.png" alt="Brilliance"> <!-- Thay link ảnh Brilliance của bạn -->
            </div>
            <span>Brilliance</span>
          </div>

          <div class="badge-option" data-house="1">
            <div class="badge-icon">
              <img src="https://static.wikia.nocookie.net/discord/images/c/ca/Hypesquad_balance_badge.png/revision/latest?cb=20210611054027" alt="Balance">    <!-- Thay link ảnh Balance của bạn -->
            </div>
            <span>Balance</span>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="action-buttons">
        <button id="setBadge" class="action-btn set-btn">ADD BADGE</button>
        <button id="removeBadge" class="action-btn remove-btn">REMOVE BADGE</button>
      </div>

      <div id="status" class="status-message info">
        Enter your token and choose the badge you want
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>Processing...</span>
      </div>

    </div>

    <div class="footer">
      ⚠️ Never share your Discord token with anyone<br>
      This tool runs locally in your browser
    </div>
  </div>

  <script>
    class DiscordHypeSquadManager {
      constructor() {
        this.token = null;
        this.selectedHouse = null;
        this.init();
      }

      init() {
        this.bindEvents();
        this.loadSavedToken();
      }

      bindEvents() {
        const tokenInput = document.getElementById('token');
        tokenInput.addEventListener('input', () => {
          this.token = this.sanitizeToken(tokenInput.value);
          localStorage.setItem('discord_token', this.token);
          this.updateButtonState();
        });

        document.getElementById('toggleToken').addEventListener('click', () => {
          const isHidden = tokenInput.type === 'password';
          tokenInput.type = isHidden ? 'text' : 'password';
          document.getElementById('toggleToken').textContent = isHidden ? '🙈' : '👀';
        });

        document.querySelectorAll('.badge-option').forEach(option => {
          option.addEventListener('click', () => this.selectBadge(option));
        });

        document.getElementById('setBadge').addEventListener('click', () => this.setBadge());
        document.getElementById('removeBadge').addEventListener('click', () => this.removeBadge());
        document.getElementById('logoutBtn').addEventListener('click', () => this.logout());
      }

      selectBadge(el) {
        document.querySelectorAll('.badge-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        this.selectedHouse = parseInt(el.dataset.house);
        this.updateButtonState();
      }

      updateButtonState() {
        document.getElementById('setBadge').disabled = !(this.token && this.selectedHouse);
      }

      sanitizeToken(t) {
        let token = String(t || '').trim();
        if ((token.startsWith('"') && token.endsWith('"')) || (token.startsWith("'") && token.endsWith("'"))) {
          token = token.slice(1, -1).trim();
        }
        return token;
      }

      async fetchUserProfile() {
        if (!this.token) return;
        try {
          const res = await fetch('https://discord.com/api/v9/users/@me', {
            headers: { 'Authorization': this.token }
          });
          if (res.ok) {
            const user = await res.json();
            this.showProfile(user);
          } else {
            this.logout();
          }
        } catch(e) {}
      }

      showProfile(user) {
        document.getElementById('profileSection').classList.remove('hidden');
        document.getElementById('username').textContent = user.username + (user.discriminator !== '0' ? '#' + user.discriminator : '');

        const avatarUrl = user.avatar 
          ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
          : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator)%5}.png`;
        document.getElementById('userAvatar').src = avatarUrl;
      }

      async setBadge() {
        if (!this.token || !this.selectedHouse) return;
        this.showLoading(true);

        const houseMap = {1: 3, 2: 1, 3: 2};
        const house_id = houseMap[this.selectedHouse];

        try {
          const res = await fetch('https://discord.com/api/v9/hypesquad/online', {
            method: 'POST',
            headers: {
              'Authorization': this.token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ house_id })
          });

          if (res.ok) {
            this.showStatus('✅ Badge added successfully!', 'success');
            setTimeout(() => this.fetchUserProfile(), 1000);
          } else {
            this.showStatus('❌ Failed to add badge', 'error');
          }
        } catch(e) {
          this.showStatus('❌ Connection error', 'error');
        } finally {
          this.showLoading(false);
        }
      }

      async removeBadge() {
        if (!this.token) return;
        this.showLoading(true);

        try {
          const res = await fetch('https://discord.com/api/v9/hypesquad/online', {
            method: 'DELETE',
            headers: { 'Authorization': this.token }
          });

          if (res.ok || res.status === 204) {
            this.showStatus('✅ Badge removed successfully!', 'success');
            document.querySelectorAll('.badge-option').forEach(e => e.classList.remove('selected'));
            this.selectedHouse = null;
            setTimeout(() => this.fetchUserProfile(), 1000);
          } else {
            this.showStatus('❌ Failed to remove badge', 'error');
          }
        } catch(e) {
          this.showStatus('❌ Connection error', 'error');
        } finally {
          this.showLoading(false);
        }
      }

      logout() {
        this.token = null;
        localStorage.removeItem('discord_token');
        document.getElementById('profileSection').classList.add('hidden');
        document.getElementById('token').value = '';
        document.querySelectorAll('.badge-option').forEach(e => e.classList.remove('selected'));
        this.selectedHouse = null;
        this.showStatus('Logged out', 'info');
      }

      loadSavedToken() {
        const saved = localStorage.getItem('discord_token');
        if (saved) {
          this.token = saved;
          document.getElementById('token').value = saved;
          this.fetchUserProfile();
        }
      }

      showStatus(msg, type = 'info') {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = `status-message ${type}`;
        setTimeout(() => {
          el.textContent = 'Enter your token and choose the badge you want';
          el.className = 'status-message info';
        }, 5500);
      }

      showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
      }
    }

    window.onload = () => new DiscordHypeSquadManager();
  </script>
</body>
</html>
